<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Manuel's Emporium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0d0a;
      --panel:      #1a1611;
      --panel2:     #201d18;
      --gold:       #c9a96e;
      --gold-light: #e8d5b0;
      --cream:      #f5f0e8;
      --muted:      rgba(245,240,232,0.45);
      --border:     rgba(245,240,232,0.1);
      --danger:     #c96e6e;
      --success:    #6ec98a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    #root {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.04em;
      padding: 0 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo span { color: var(--gold); }

    .sidebar-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 1.4rem 1.5rem 0.6rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 1.5rem;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: color 0.2s, background 0.2s;
      border-left: 2px solid transparent;
    }

    .nav-item:hover { color: var(--cream); background: rgba(255,255,255,0.03); }

    .nav-item.active {
      color: var(--gold);
      border-left-color: var(--gold);
      background: rgba(201,169,110,0.06);
    }

    .nav-icon { font-size: 0.9rem; width: 16px; text-align: center; }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.55rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* MAIN */
    .main {
      flex: 1;
      min-width: 0;
      padding: 2.5rem 3rem;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--cream);
    }

    .page-title em { font-style: italic; color: var(--gold); }

    .page-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* BUTTONS */
    .btn-add {
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      padding: 0.65rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover { background: var(--gold-light); }

    .btn-edit {
      background: rgba(201,169,110,0.12);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 3px;
      padding: 0.35rem 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .btn-edit:hover { background: rgba(201,169,110,0.2); }

    .btn-del {
      background: rgba(201,110,110,0.1);
      color: var(--danger);
      border: 1px solid rgba(201,110,110,0.2);
      border-radius: 3px;
      padding: 0.35rem 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .btn-del:hover { background: rgba(201,110,110,0.2); }

    /* TABLE */
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 0.85rem 1.2rem;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    td {
      padding: 0.9rem 1.2rem;
      font-size: 0.85rem;
      color: var(--cream);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: rgba(255,255,255,0.02); }

    .td-muted { color: var(--muted); font-size: 0.8rem; }

    .tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(201,169,110,0.12);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.2);
    }

    .tag-green {
      background: rgba(110,201,138,0.12);
      color: var(--success);
      border-color: rgba(110,201,138,0.2);
    }

    .actions { display: flex; gap: 0.5rem; }

    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--cream);
    }

    .modal-title em { font-style: italic; color: var(--gold); }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--cream); }

    /* FORM */
    .form-row { margin-bottom: 1.2rem; }

    .form-row label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .form-row input[type="text"],
    .form-row input[type="number"],
    .form-row input[type="date"],
    .form-row input[type="url"],
    .form-row select,
    .form-row textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.65rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row select { cursor: pointer; }
    .form-row select option { background: var(--panel); color: var(--cream); }

    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus { border-color: var(--gold); }

    .form-row input::placeholder,
    .form-row textarea::placeholder { color: var(--muted); }

    .form-row textarea { resize: vertical; min-height: 80px; }

    /* IMAGE PICKER */
    .img-preview {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
      margin-bottom: 0.6rem;
      display: block;
    }

    .img-picker-row {
      display: flex;
      gap: 0.6rem;
    }

    .img-picker-row input[type="text"] {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.65rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .img-picker-row input[type="text"]:focus { border-color: var(--gold); }
    .img-picker-row input[type="text"]::placeholder { color: var(--muted); }

    .btn-upload {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 3px;
      padding: 0.5rem 0.9rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-upload:hover { background: rgba(201,169,110,0.2); }
    .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-check {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .form-check input { width: auto; cursor: pointer; accent-color: var(--gold); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 1.8rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancel:hover { border-color: var(--cream); color: var(--cream); }

    .btn-save {
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      padding: 0.6rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover { background: var(--gold-light); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      padding: 0.85rem 1.2rem;
      font-size: 0.82rem;
      color: var(--cream);
      z-index: 1000;
      animation: slideIn 0.25s ease;
    }

    .toast.error { border-left-color: var(--danger); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }

    /* STATS */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.4rem 1.6rem;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--cream);
      line-height: 1;
    }

    .img-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .no-img {
      width: 40px;
      height: 40px;
      background: var(--panel2);
      border-radius: 3px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
    }

    /* MESSAGES */
    .message-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 0.8rem;
    }

    .message-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .message-meta strong { color: var(--cream); }

    .message-body { font-size: 0.85rem; color: rgba(245,240,232,0.7); line-height: 1.6; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 1.5rem; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  {% raw %}
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─── API helpers ──────────────────────────────────────────────────────────

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (res.status === 204) return null;
      return res.json();
    }

    // ─── Toast ────────────────────────────────────────────────────────────────

    function Toast({ message, type, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 3000);
        return () => clearTimeout(t);
      }, []);
      return <div className={"toast" + (type === 'error' ? ' error' : '')}>{message}</div>;
    }

    // ─── Image cell ───────────────────────────────────────────────────────────

    function ImgCell({ url }) {
      if (!url) return <div className="no-img">No img</div>;
      return <img src={url} alt="" className="img-thumb" />;
    }

    // ─── Image Picker ─────────────────────────────────────────────────────────

    function ImagePicker({ value, onChange }) {
      const [uploading, setUploading] = React.useState(false);
      const inputRef = React.useRef();

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        const fd = new FormData();
        fd.append('file', file);
        try {
          const res  = await fetch('/api/admin/upload', { method: 'POST', body: fd });
          const data = await res.json();
          if (data.url) onChange(data.url);
          else alert(data.error || 'Upload failed.');
        } catch {
          alert('Upload failed — check your connection.');
        }
        setUploading(false);
        e.target.value = '';
      };

      return (
        <div>
          {value && <img src={value} className="img-preview" alt="preview" />}
          <div className="img-picker-row">
            <input
              type="text"
              value={value}
              onChange={e => onChange(e.target.value)}
              placeholder="Paste a URL or click Upload"
            />
            <button type="button" className="btn-upload" onClick={() => inputRef.current.click()} disabled={uploading}>
              {uploading ? 'Uploading…' : '↑ Upload'}
            </button>
          </div>
          <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile} />
        </div>
      );
    }

    // ─── Product modal ────────────────────────────────────────────────────────

    const PRODUCT_CATEGORIES = ['Hair Care', 'Skin Care', 'Body Care', 'Bundles'];

    function ProductModal({ initial, onSave, onClose }) {
      const blank = { name: '', category: 'Hair Care', price: '', description: '', image_url: '', featured: false };
      const [form, setForm] = useState(initial ? { ...initial, image_url: initial.image_url || '' } : blank);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({ ...form, image_url: form.image_url.trim() || null });
      };

      return (
        <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">{initial ? <><em>Edit</em> Product</> : <><em>New</em> Product</>}</div>
              <button className="modal-close" onClick={onClose}>&#x2715;</button>
            </div>
            <form onSubmit={handleSubmit}>
              <div className="form-row">
                <label>Product Name *</label>
                <input type="text" value={form.name} onChange={e => set('name', e.target.value)} placeholder="e.g. Signature Hair Oil" required />
              </div>
              <div className="form-grid">
                <div className="form-row">
                  <label>Category *</label>
                  <select value={form.category} onChange={e => set('category', e.target.value)}>
                    {PRODUCT_CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label>Price *</label>
                  <input type="text" value={form.price} onChange={e => set('price', e.target.value)} placeholder="e.g. 34.99" required />
                </div>
              </div>
              <div className="form-row">
                <label>Description</label>
                <textarea value={form.description} onChange={e => set('description', e.target.value)} placeholder="Short product description..." />
              </div>
              <div className="form-row">
                <label>Image</label>
                <ImagePicker value={form.image_url} onChange={v => set('image_url', v)} />
              </div>
              <div className="form-row">
                <label className="form-check">
                  <input type="checkbox" checked={form.featured} onChange={e => set('featured', e.target.checked)} />
                  Feature this product on the homepage
                </label>
              </div>
              <div className="modal-actions">
                <button type="button" className="btn-cancel" onClick={onClose}>Cancel</button>
                <button type="submit" className="btn-save">Save Product</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ─── Journal modal ────────────────────────────────────────────────────────

    function JournalModal({ initial, onSave, onClose }) {
      const blank = { title: '', category: '', excerpt: '', body: '', date: '', image_url: '' };
      const [form, setForm] = useState(initial ? { ...initial, image_url: initial.image_url || '' } : blank);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({ ...form, image_url: form.image_url.trim() || null });
      };

      return (
        <div className="modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">{initial ? <><em>Edit</em> Post</> : <><em>New</em> Post</>}</div>
              <button className="modal-close" onClick={onClose}>&#x2715;</button>
            </div>
            <form onSubmit={handleSubmit}>
              <div className="form-row">
                <label>Title *</label>
                <input type="text" value={form.title} onChange={e => set('title', e.target.value)} placeholder="Post title" required />
              </div>
              <div className="form-grid">
                <div className="form-row">
                  <label>Category</label>
                  <input type="text" value={form.category} onChange={e => set('category', e.target.value)} placeholder="e.g. Hair Care" />
                </div>
                <div className="form-row">
                  <label>Date</label>
                  <input type="date" value={form.date} onChange={e => set('date', e.target.value)} />
                </div>
              </div>
              <div className="form-row">
                <label>Excerpt</label>
                <textarea value={form.excerpt} onChange={e => set('excerpt', e.target.value)} placeholder="Short preview shown in listing..." style={{minHeight: '60px'}} />
              </div>
              <div className="form-row">
                <label>Body</label>
                <textarea value={form.body} onChange={e => set('body', e.target.value)} placeholder="Full article content..." style={{minHeight: '120px'}} />
              </div>
              <div className="form-row">
                <label>Image</label>
                <ImagePicker value={form.image_url} onChange={v => set('image_url', v)} />
              </div>
              <div className="modal-actions">
                <button type="button" className="btn-cancel" onClick={onClose}>Cancel</button>
                <button type="submit" className="btn-save">Save Post</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ─── Products tab ─────────────────────────────────────────────────────────

    function ProductsTab({ toast }) {
      const [products, setProducts] = useState([]);
      const [loading, setLoading]   = useState(true);
      const [modal, setModal]       = useState(null); // null | { mode: 'add'|'edit', data }

      const load = () => {
        apiFetch('/api/admin/products').then(d => { setProducts(d || []); setLoading(false); });
      };

      useEffect(load, []);

      const openAdd  = () => setModal({ mode: 'add', data: null });
      const openEdit = (p) => setModal({ mode: 'edit', data: p });
      const close    = () => setModal(null);

      const save = async (form) => {
        if (modal.mode === 'add') {
          await apiFetch('/api/admin/products', { method: 'POST', body: JSON.stringify(form) });
          toast('Product added.');
        } else {
          await apiFetch(`/api/admin/products/${modal.data.id}`, { method: 'PUT', body: JSON.stringify(form) });
          toast('Product updated.');
        }
        close();
        load();
      };

      const del = async (id, name) => {
        if (!confirm(`Delete "${name}"?`)) return;
        await apiFetch(`/api/admin/products/${id}`, { method: 'DELETE' });
        toast('Product deleted.');
        load();
      };

      return (
        <>
          <div className="page-header">
            <div>
              <div className="page-title">Products</div>
              <div className="page-sub">{products.length} item{products.length !== 1 ? 's' : ''} in your catalogue</div>
            </div>
            <button className="btn-add" onClick={openAdd}>+ Add Product</button>
          </div>

          <div className="stats-row">
            <div className="stat-card">
              <div className="stat-label">Total Products</div>
              <div className="stat-value">{products.length}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Featured</div>
              <div className="stat-value">{products.filter(p => p.featured).length}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">With Images</div>
              <div className="stat-value">{products.filter(p => p.image_url).length}</div>
            </div>
          </div>

          <div className="table-wrap">
            {loading ? (
              <div className="empty-state">Loading…</div>
            ) : products.length === 0 ? (
              <div className="empty-state">No products yet. Add your first one.</div>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Featured</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {products.map(p => (
                    <tr key={p.id}>
                      <td><ImgCell url={p.image_url} /></td>
                      <td>{p.name}</td>
                      <td><span className="tag">{p.category}</span></td>
                      <td className="td-muted">${p.price}</td>
                      <td>{p.featured ? <span className="tag tag-green">Yes</span> : <span className="td-muted">—</span>}</td>
                      <td>
                        <div className="actions">
                          <button className="btn-edit" onClick={() => openEdit(p)}>Edit</button>
                          <button className="btn-del"  onClick={() => del(p.id, p.name)}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          {modal && (
            <ProductModal
              initial={modal.data}
              onSave={save}
              onClose={close}
            />
          )}
        </>
      );
    }

    // ─── Journal tab ──────────────────────────────────────────────────────────

    function JournalTab({ toast }) {
      const [posts, setPosts]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal, setModal]   = useState(null);

      const load = () => {
        apiFetch('/api/admin/journal').then(d => { setPosts(d || []); setLoading(false); });
      };

      useEffect(load, []);

      const openAdd  = () => setModal({ mode: 'add', data: null });
      const openEdit = (p) => setModal({ mode: 'edit', data: p });
      const close    = () => setModal(null);

      const save = async (form) => {
        if (modal.mode === 'add') {
          await apiFetch('/api/admin/journal', { method: 'POST', body: JSON.stringify(form) });
          toast('Post published.');
        } else {
          await apiFetch(`/api/admin/journal/${modal.data.id}`, { method: 'PUT', body: JSON.stringify(form) });
          toast('Post updated.');
        }
        close();
        load();
      };

      const del = async (id, title) => {
        if (!confirm(`Delete "${title}"?`)) return;
        await apiFetch(`/api/admin/journal/${id}`, { method: 'DELETE' });
        toast('Post deleted.');
        load();
      };

      const fmt = (d) => d ? new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';

      return (
        <>
          <div className="page-header">
            <div>
              <div className="page-title">Journal</div>
              <div className="page-sub">{posts.length} post{posts.length !== 1 ? 's' : ''} published</div>
            </div>
            <button className="btn-add" onClick={openAdd}>+ New Post</button>
          </div>

          <div className="table-wrap">
            {loading ? (
              <div className="empty-state">Loading…</div>
            ) : posts.length === 0 ? (
              <div className="empty-state">No posts yet. Write your first journal entry.</div>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {posts.map(p => (
                    <tr key={p.id}>
                      <td><ImgCell url={p.image_url} /></td>
                      <td>
                        <div>{p.title}</div>
                        {p.excerpt && <div className="td-muted" style={{marginTop: '2px', fontSize: '0.75rem', maxWidth: '300px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>{p.excerpt}</div>}
                      </td>
                      <td><span className="tag">{p.category || '—'}</span></td>
                      <td className="td-muted">{fmt(p.date)}</td>
                      <td>
                        <div className="actions">
                          <button className="btn-edit" onClick={() => openEdit(p)}>Edit</button>
                          <button className="btn-del"  onClick={() => del(p.id, p.title)}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          {modal && (
            <JournalModal
              initial={modal.data}
              onSave={save}
              onClose={close}
            />
          )}
        </>
      );
    }

    // ─── Messages tab ─────────────────────────────────────────────────────────

    function MessagesTab() {
      const [messages, setMessages] = useState([]);
      const [loading, setLoading]   = useState(true);

      useEffect(() => {
        apiFetch('/api/admin/messages').then(d => { setMessages(d || []); setLoading(false); });
      }, []);

      return (
        <>
          <div className="page-header">
            <div>
              <div className="page-title">Messages</div>
              <div className="page-sub">{messages.length} contact submission{messages.length !== 1 ? 's' : ''}</div>
            </div>
          </div>

          {loading ? (
            <div className="empty-state">Loading…</div>
          ) : messages.length === 0 ? (
            <div className="empty-state" style={{background: 'var(--panel)', borderRadius: '6px', border: '1px solid var(--border)'}}>
              No messages yet.
            </div>
          ) : (
            [...messages].reverse().map((m, i) => (
              <div className="message-card" key={i}>
                <div className="message-meta">
                  <span><strong>{m.name}</strong></span>
                  <span>{m.email}</span>
                </div>
                <div className="message-body">{m.message}</div>
              </div>
            ))
          )}
        </>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────

    function App() {
      const [tab, setTab]     = useState('products');
      const [toast, setToast] = useState(null);

      const showToast = useCallback((msg, type = 'ok') => {
        setToast({ msg, type });
      }, []);

      const tabs = [
        { id: 'products', label: 'Products',  icon: '◈' },
        { id: 'journal',  label: 'Journal',   icon: '✦' },
        { id: 'messages', label: 'Messages',  icon: '✉' },
      ];

      return (
        <>
          <aside className="sidebar">
            <div className="sidebar-logo">Manuel's <span>Emporium</span></div>

            <span className="sidebar-label">Manage</span>
            {tabs.map(t => (
              <button
                key={t.id}
                className={"nav-item" + (tab === t.id ? " active" : "")}
                onClick={() => setTab(t.id)}
              >
                <span className="nav-icon">{t.icon}</span>
                {t.label}
              </button>
            ))}

            <span className="sidebar-label">Store</span>
            <a href="/" target="_blank" rel="noreferrer" style={{textDecoration:'none'}}>
              <button className="nav-item">
                <span className="nav-icon">↗</span>
                View Store
              </button>
            </a>

            <div className="sidebar-spacer" />

            <div className="sidebar-footer">
              <form method="POST" action="/admin/logout">
                <button type="submit" className="logout-btn">Sign Out</button>
              </form>
            </div>
          </aside>

          <main className="main">
            {tab === 'products' && <ProductsTab toast={showToast} />}
            {tab === 'journal'  && <JournalTab  toast={showToast} />}
            {tab === 'messages' && <MessagesTab />}
          </main>

          {toast && (
            <Toast
              message={toast.msg}
              type={toast.type}
              onDone={() => setToast(null)}
            />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  {% endraw %}
</body>
</html>
